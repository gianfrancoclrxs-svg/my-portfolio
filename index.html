<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Portfolio — Gian Franco Caoile</title>
  <link rel="stylesheet" href="style.css" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/devicons/devicon@latest/devicon.min.css">
</head>
<body>

  <!-- ===================== HERO / SPLASH ===================== -->
  <div class="hero" id="hero">

    <!-- Ambient glow -->
    <div class="hero-glow"></div>

    <!-- Vertical light bars (like the Figma glass effect) -->
    <div class="hero-bars" id="heroBars"></div>

    <!-- Corner decorations -->
    <div class="hero-corner tl">
      <span class="hero-diamond"></span>
      <span>Portfolio</span>
    </div>
    <div class="hero-corner tr">
      <span class="hero-diamond"></span>
    </div>
    <div class="hero-corner bl">© 2025 GFRC</div>
    <div class="hero-corner br">
      <span>Creative &amp; Dev</span>
      <span class="hero-diamond"></span>
    </div>

    <!-- Main content -->
    <div class="hero-content">
      <div class="hero-badge">
        <div class="hero-badge-dot"></div>
        <span>Creative Specialist &amp; Frontend Developer</span>
      </div>

      <div class="hero-name">
        GIAN FRANCO<br>
        <span>CAOILE</span>

        <!-- SVG cursor highlight — injected dynamically by JS to fit the name exactly -->
        <div class="hero-name-cursor-wrap" id="heroNameCursorWrap"></div>
      </div>

      <div class="hero-divider"></div>

      <div class="hero-role">Visual Designer &bull; Filmmaker &bull; Web Developer</div>

      <div class="hero-cta">
        <span class="hero-cta-text">Click anywhere to explore</span>
        <div class="hero-scroll-line"></div>
      </div>
    </div>
  </div>

  <!-- ===================== MAIN SITE ===================== -->
  <div class="site-wrap" id="siteWrap">

    <!-- Glass background panels -->
    <div class="glass-bg">
      <div class="glass-panel"></div>
      <div class="glass-panel"></div>
      <div class="glass-panel"></div>
    </div>

    <div class="header" id="header">
      <div class="header-left">
        <div class="name">GIAN FRANCO CAOILE</div>
        <div class="role">
          <span id="typing"></span><span class="cursor">|</span>
        </div>
      </div>
      <div class="header-right tools">
        <img src="https://cdn.jsdelivr.net/gh/devicons/devicon/icons/premierepro/premierepro-original.svg" alt="Premiere Pro" title="Premiere Pro" class="tool-logo">
        <img src="https://cdn.jsdelivr.net/gh/devicons/devicon/icons/photoshop/photoshop-original.svg" alt="Photoshop" title="Photoshop" class="tool-logo">
        <img src="https://cdn.jsdelivr.net/gh/devicons/devicon/icons/html5/html5-original.svg" alt="HTML" title="HTML" class="tool-logo">
        <img src="https://cdn.jsdelivr.net/gh/devicons/devicon/icons/css3/css3-original.svg" alt="CSS" title="CSS" class="tool-logo">
        <img src="https://cdn.jsdelivr.net/gh/devicons/devicon/icons/javascript/javascript-original.svg" alt="JavaScript" title="JavaScript" class="tool-logo">
        <img src="https://cdn.jsdelivr.net/gh/devicons/devicon/icons/vscode/vscode-original.svg" alt="VS Code" title="VS Code" class="tool-logo">
        <img src="https://public.canva.site/logo/media/dc132601bacce0be0f02d5473da2adad.svg" alt="Canva" title="Canva" class="tool-logo">
      </div>
    </div>

    <div class="menu">
      <div class="card"><div class="icon"><i class="fa-solid fa-pen-nib"></i></div><div class="label">Graphic Designs</div></div>
      <div class="card"><div class="icon"><i class="fa-solid fa-laptop-code"></i></div><div class="label">Websites</div></div>
      <div class="card"><div class="icon"><i class="fa-solid fa-camera"></i></div><div class="label">Photography</div></div>
      <div class="card"><div class="icon"><i class="fa-solid fa-certificate"></i></div><div class="label">Certificates</div></div>
      <div class="card"><div class="icon"><i class="fa-solid fa-layer-group"></i></div><div class="label">Other Works</div></div>
    </div>

    <div class="sidebar" id="sidebar"></div>
    <div class="overlay" id="overlay"></div>
    <div class="content" id="content">
      <h2 id="title"></h2>
      <div class="gallery" id="gallery"></div>
    </div>

  </div><!-- /site-wrap -->

  <script src="data.js"></script>
  <script src="script.js"></script>
  <script src="socials.js"></script>
  <script>
    /* ---- Generate vertical light bars ---- */
    (function() {
      const container = document.getElementById("heroBars");
      const vw = window.innerWidth;
      const barCount = Math.floor(vw / 22);
      const colors = [
        'rgba(120,100,255,0.9)',
        'rgba(100,80,240,0.7)',
        'rgba(160,140,255,0.6)',
        'rgba(200,180,255,0.4)',
        'rgba(80,60,200,0.5)',
        'rgba(180,160,255,0.3)',
      ];

      for (let i = 0; i < barCount; i++) {
        const bar = document.createElement("div");
        bar.className = "hero-bar";

        const heightPct = 20 + Math.random() * 65; // 20-85% of viewport height
        const left = (i / barCount) * 100;
        const colorIdx = Math.floor(Math.random() * colors.length);
        const width = 1.5 + Math.random() * 3;
        const blur = Math.random() < 0.3 ? `${1 + Math.random() * 4}px` : '0px';
        const dur = 2.5 + Math.random() * 3;
        const delay = Math.random() * 3;

        bar.style.cssText = `
          left: ${left}%;
          height: ${heightPct}vh;
          width: ${width}px;
          --c: ${colors[colorIdx]};
          --dur: ${dur}s;
          --delay: ${delay}s;
          --blur: ${blur};
        `;
        container.appendChild(bar);
      }
    })();

    /* ---- Dynamic drag-select cursor animation ---- */
    (function () {
      const PAD        = 14;   // px padding around name
      const DRAG_DUR   = 1600; // ms to drag from corner to corner
      const HOLD_DUR   = 800;  // ms to hold the completed box
      const FADE_DUR   = 400;  // ms to fade out
      const PAUSE_DUR  = 7000; // ms to wait before repeating

      const ns = 'http://www.w3.org/2000/svg';
      let svg, cursorG, selRect, cornerTL, cornerTR, cornerBL, cornerBR, labelG;
      let W = 0, H = 0;
      let animId = null, phaseStart = 0, phase = 'pause';
      let pauseTimer = null;

      /* ease-in-out cubic */
      function ease(t) {
        return t < 0.5 ? 4*t*t*t : 1 - Math.pow(-2*t+2,3)/2;
      }

      function lerp(a, b, t) { return a + (b - a) * t; }

      /* Create SVG elements once */
      function buildDOM() {
        const wrapEl = document.getElementById('heroNameCursorWrap');
        wrapEl.innerHTML = '';

        svg = document.createElementNS(ns, 'svg');
        svg.setAttribute('fill', 'none');
        svg.style.cssText = 'position:absolute;top:0;left:0;width:100%;height:100%;overflow:visible;';

        /* Selection rectangle (grows during drag) */
        selRect = document.createElementNS(ns, 'rect');
        selRect.setAttribute('rx', '6');
        selRect.setAttribute('stroke', '#7c6ef5');
        selRect.setAttribute('stroke-width', '2');
        selRect.setAttribute('fill', 'rgba(124,110,245,0.07)');
        svg.appendChild(selRect);

        /* Corner brackets */
        function corner(id) {
          const r = document.createElementNS(ns, 'rect');
          r.setAttribute('width', '10'); r.setAttribute('height', '10');
          r.setAttribute('fill', 'white');
          r.setAttribute('stroke', '#7c6ef5'); r.setAttribute('stroke-width', '1.5');
          r.id = id; svg.appendChild(r); return r;
        }
        cornerTL = corner('hcCTL');
        cornerTR = corner('hcCTR');
        cornerBL = corner('hcCBL');
        cornerBR = corner('hcCBR');

        /* Cursor group */
        cursorG = document.createElementNS(ns, 'g');
        const arrow = document.createElementNS(ns, 'path');
        arrow.id = 'hcArrow';
        arrow.setAttribute('fill', '#7c6ef5');
        arrow.setAttribute('stroke', 'white');
        arrow.setAttribute('stroke-width', '1.5');
        cursorG.appendChild(arrow);

        labelG = document.createElementNS(ns, 'g');
        const pill = document.createElementNS(ns, 'rect');
        pill.setAttribute('width', '118'); pill.setAttribute('height', '28');
        pill.setAttribute('rx', '5'); pill.setAttribute('fill', '#7c6ef5');
        const txt = document.createElementNS(ns, 'text');
        txt.setAttribute('text-anchor', 'middle');
        txt.setAttribute('font-family', "'DM Sans', sans-serif");
        txt.setAttribute('font-size', '11');
        txt.setAttribute('font-weight', '500');
        txt.setAttribute('fill', 'white');
        txt.setAttribute('letter-spacing', '0.3');
        txt.textContent = "Gian";
        labelG.appendChild(pill);
        labelG.appendChild(txt);
        cursorG.appendChild(labelG);
        svg.appendChild(cursorG);

        wrapEl.appendChild(svg);
      }

      /* Update SVG elements given current cursor position (cx,cy) and box progress (0-1) */
      function render(cx, cy, boxT, masterAlpha) {
        svg.style.opacity = masterAlpha;

        /* Box grows from top-left (0,0) toward bottom-right (W,H) */
        const bx = 2, by = 2;
        const bw = Math.max(0, lerp(0, W - 4, boxT));
        const bh = Math.max(0, lerp(0, H - 4, boxT));

        selRect.setAttribute('x', bx);
        selRect.setAttribute('y', by);
        selRect.setAttribute('width', bw);
        selRect.setAttribute('height', bh);

        /* Corners follow the growing rect */
        cornerTL.setAttribute('x', -3); cornerTL.setAttribute('y', -3);
        cornerTR.setAttribute('x', bx + bw - 7); cornerTR.setAttribute('y', -3);
        cornerBL.setAttribute('x', -3);           cornerBL.setAttribute('y', by + bh - 7);
        cornerBR.setAttribute('x', bx + bw - 7); cornerBR.setAttribute('y', by + bh - 7);

        /* Only show TR/BL/BR corners once they have some size */
        const showExtra = boxT > 0.05 ? '1' : '0';
        cornerTR.style.opacity = showExtra;
        cornerBL.style.opacity = showExtra;
        cornerBR.style.opacity = showExtra;

        /* Cursor arrow at (cx, cy) */
        const ax = cx, ay = cy;
        document.getElementById('hcArrow').setAttribute('d',
          `M${ax} ${ay} L${ax-6} ${ay-22} L${ax+15} ${ay-11} L${ax+6} ${ay-8.5} L${ax} ${ay}Z`
        );

        /* Label pill: appears only when box is nearly done */
        const labelAlpha = boxT > 0.85 ? Math.min(1, (boxT - 0.85) / 0.15) : 0;
        labelG.style.opacity = labelAlpha;
        const pillX = ax + 10, pillY = ay + 2;
        labelG.children[0].setAttribute('x', pillX);
        labelG.children[0].setAttribute('y', pillY);
        labelG.children[1].setAttribute('x', pillX + 59);
        labelG.children[1].setAttribute('y', pillY + 18);
      }

      /* Main animation loop */
      function tick(now) {
        const elapsed = now - phaseStart;

        if (phase === 'drag') {
          const t = Math.min(elapsed / DRAG_DUR, 1);
          const et = ease(t);
          /* Cursor: top-left → bottom-right of the box */
          const cx = lerp(0, W, et);
          const cy = lerp(0, H, et);
          render(cx, cy, et, 1);

          if (t >= 1) { phase = 'hold'; phaseStart = now; }
          animId = requestAnimationFrame(tick);

        } else if (phase === 'hold') {
          render(W, H, 1, 1);
          if (elapsed >= HOLD_DUR) { phase = 'fade'; phaseStart = now; }
          animId = requestAnimationFrame(tick);

        } else if (phase === 'fade') {
          const t = Math.min(elapsed / FADE_DUR, 1);
          render(W, H, 1, 1 - ease(t));
          if (t >= 1) {
            phase = 'pause';
            svg.style.opacity = 0;
            cancelAnimationFrame(animId);
            pauseTimer = setTimeout(startDrag, PAUSE_DUR);
          } else {
            animId = requestAnimationFrame(tick);
          }
        }
      }

      function startDrag() {
        phase = 'drag';
        phaseStart = performance.now();
        animId = requestAnimationFrame(tick);
      }

      /* Measure the name el and position the wrapper */
      function measure() {
        const nameEl = document.querySelector('.hero-name');
        const wrapEl = document.getElementById('heroNameCursorWrap');
        if (!nameEl || !wrapEl) return;

        const r = nameEl.getBoundingClientRect();
        W = r.width  + PAD * 2;
        H = r.height + PAD * 2;

        wrapEl.style.position = 'absolute';
        wrapEl.style.left   = (-PAD) + 'px';
        wrapEl.style.top    = (-PAD) + 'px';
        wrapEl.style.width  = W + 'px';
        wrapEl.style.height = H + 'px';

        if (svg) {
          svg.setAttribute('viewBox', `0 0 ${W} ${H}`);
        }
      }

      function init() {
        measure();
        buildDOM();
        measure(); // re-measure after DOM built
        // Hide everything initially
        if (svg) svg.style.opacity = 0;
        // Kick off first drag after a short delay
        pauseTimer = setTimeout(startDrag, 1200);
      }

      window.addEventListener('resize', () => {
        measure();
        cancelAnimationFrame(animId);
        clearTimeout(pauseTimer);
        if (svg) svg.style.opacity = 0;
        phase = 'pause';
        pauseTimer = setTimeout(startDrag, 600);
      });

      window.addEventListener('load', init);
      setTimeout(init, 400);
    })();

    /* ---- Splash / Hero dismiss ---- */
    const hero = document.getElementById("hero");
    const siteWrap = document.getElementById("siteWrap");

    function dismissHero() {
      hero.classList.add("hero-exit");
      setTimeout(() => {
        hero.style.display = "none";
        siteWrap.classList.add("site-visible");
      }, 800);
    }

    hero.addEventListener("click", dismissHero);
  </script>
</body>
</html>
